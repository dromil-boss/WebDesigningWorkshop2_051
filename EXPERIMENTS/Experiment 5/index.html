<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management System | JS Lab</title>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">
<div class="container py-4">
<!-- Header -->
<div class="text-center mb-4">
<h1 class="fw-bold">👔 Employee Management System</h1>
<p class="text-secondary">JavaScript Arrays & Objects - Lab Experiment 5</p>
</div>
<!-- Add Employee -->
<div class="card glass mb-4">
<div class="card-body">
<h5 class="card-title">➕ Add New Employee</h5>
<div class="row g-3">
<div class="col-md-6">
<label class="form-label">Employee Name</label>
<input type="text" id="empName" class="form-control">
</div>
<div class="col-md-6">
<label class="form-label">Employee ID</label>
<input type="number" id="empId" class="form-control">
</div>
<div class="col-md-6">
<label class="form-label">Salary</label>
<input type="number" id="empSalary" class="form-control">
</div>
<div class="col-md-6">
<label class="form-label">Department</label>
<input type="text" id="empDept" class="form-control">
</div>
</div>
<button class="btn btn-primary mt-3 w-100" onclick="addEmployee()">Add Employee</button>
<div id="addMessage" class="mt-3 hidden"></div>
</div>
</div>
<!-- Operations -->
<div class="card glass mb-4">
<div class="card-body">
<h5 class="card-title">⚙️ Operations</h5>
<div class="row g-2">
<div class="col-md-6">
<button class="btn btn-primary w-100" onclick="displayAllEmployees()">Display All</button>
</div>
<div class="col-md-6">
<button class="btn btn-success w-100" onclick="filterHighSalary()">Salary > ₹50K</button>
</div>
<div class="col-md-6">
<button class="btn btn-warning w-100" onclick="calculateTotalSalary()">Total Salary</button>
</div>
<div class="col-md-6">
<button class="btn btn-info w-100" onclick="calculateAverageSalary()">Average Salary</button>
</div>
</div>
<div class="input-group mt-3">
<input type="text" id="deptInput" class="form-control" placeholder="Department">
<button class="btn btn-dark" onclick="countByDepartment()">Count</button>
</div>
</div>
</div>
<!-- Results -->
<div class="card glass">
<div class="card-body">
<div id="resultArea" class="hidden"></div>
</div>
</div>
</div>
<script src="java.js"></script>
</body>
<style>
    /* Glass effect card */
.glass {
    background:rgb(213, 190, 190);
    border: 5px rgb(151, 229, 151);
    backdrop-filter: blur(10px);
    border-radius: 15px;
}
/* Result Title */
.result-title {
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 10px;
}
/* Table Styling */
.emp-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
.emp-table th, .emp-table td {
    padding: 10px;
    border-bottom: 1px solid #e9e7e7;
    text-align: left;
}
.emp-table th {
    background: #222;
}
/* Salary badges */
.badge-high {
    color: #00ff88;
    font-weight: bold;
}
.badge-low {
    color: #ccc;
}
/* Stat Cards */
.stat-card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}
.stat-label {
    font-size: 0.9rem;
    color: #aaa;
}
.stat-value {
    font-size: 1.8rem;
    font-weight: bold;
}
/* Messages */
.message {
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}
.success {
    background: rgba(0,255,100,0.1);
    color: #00ff88;
}
.error {
    background: rgba(255,0,0,0.1);
    color: #ff4d4d;
}
/* Empty state */
.empty-state {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
/* Utility */
.hidden {
    display: none;
}
</style>
</html>
